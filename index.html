<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>斑马百科 · 产品营销周报看板</title>

  <script>document.write('<link rel="stylesheet" href="css/style.css?_=' + Date.now() + '">');</script>
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>

  <!-- 防缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <!-- ===== 顶部导航 ===== -->
  <header class="header">
    <h1 class="header-title">🦓 斑马百科 · 产品营销周报看板</h1>
    <div class="header-nav">
      <!-- 周次切换器（下拉选择） -->
      <div class="week-switcher">
        <select id="weekSelect" aria-label="选择周次"></select>
      </div>
      <!-- 操作按钮 -->
      <div class="header-actions">
        <button id="adminLoginBtn">管理者登录</button>
        <button id="snapshotBtn" class="admin-only" title="生成快照">📸 快照</button>
        <button id="snapshotListBtn" title="查看快照列表">📋</button>
      </div>
    </div>
  </header>

  <!-- 快照提示横幅 -->
  <div class="snapshot-banner" id="snapshotBanner">
    <span id="snapshotBannerText"></span>
    <button id="exitSnapshotBtn">退出快照</button>
  </div>

  <!-- 周次副标题 -->
  <div class="week-subtitle" id="weekSubtitle">W23 (6.01-6.07)</div>

  <!-- ===== 目录导航栏 ===== -->
  <nav class="toc-nav" id="tocNav">
    <a href="#section-okr">OKR完成情况</a>
    <a href="#section-data-overview">数据总览</a>
    <a href="#section-highlights">本周重点</a>
    <a href="#section-nextweek">下周重点</a>
  </nav>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content">

    <!-- 一、OKR完成情况 -->
    <section class="section" id="section-okr">
      <div class="section-header">
        <span class="section-icon">🎯</span>
        <h2>OKR完成情况</h2>
      </div>
      <div class="section-body" id="okrContent">
        <!-- JS动态渲染 -->
      </div>
    </section>

    <!-- 二、数据总览 -->
    <section class="section" id="section-data-overview">
      <div class="section-header">
        <span class="section-icon">📊</span>
        <h2>数据总览</h2>
      </div>
      <div class="section-body">

        <!-- 2.1 + 2.2 总售卖数据 + 总下载拉新数据 并排布局 -->
        <div class="two-col-layout" id="salesDownloadRow">
          <div class="col-half">
            <div class="subsection" id="section-sales">
              <h4>💰 总售卖数据</h4>
              <div class="cards-grid" id="salesOverview">
                <!-- JS动态渲染 -->
              </div>
            </div>
          </div>
          <div class="col-half">
            <div class="subsection" id="section-download">
              <h4>📲 总下载拉新数据</h4>
              <div class="cards-grid" id="downloadData">
                <!-- JS动态渲染 -->
              </div>
            </div>
          </div>
        </div>

        <!-- 2.3 站内周数据 -->
        <div class="subsection" id="section-internal">
          <h4>📊 站内周数据</h4>
          <!-- (1) 销售数据 - 左右并排布局 -->
          <div class="subsection">
            <h4>📈 销售数据</h4>
            <div class="two-col-layout equal">
              <div class="col-half">
                <div id="internalSales"></div>
              </div>
              <div class="col-half">
                <div class="chart-container">
                  <h5>站内销售周趋势</h5>
                  <canvas id="salesChart"></canvas>
                </div>
              </div>
            </div>
          </div>

          <!-- (2) TOP-SKU (moved before 商城曝光) -->
          <div class="subsection">
            <h4>🏆 TOP-SKU</h4>
            <div id="topSKU"></div>
          </div>

          <!-- (3) 商城曝光数据 -->
          <div class="subsection">
            <h4>👁️ 商城曝光数据</h4>
            <div id="exposureData"></div>
            <div class="chart-container">
              <canvas id="exposureChart"></canvas>
            </div>
          </div>

          <!-- (4) 图书预约数据 -->
          <div class="subsection">
            <h4>📚 图书预约数据</h4>
            <div class="cards-grid" id="bookReservation"></div>
          </div>

          <!-- 退费率趋势（小图） -->
          <div class="subsection">
            <h4>📉 退费率趋势</h4>
            <div class="chart-container" style="height: 150px;">
              <canvas id="refundChart"></canvas>
            </div>
          </div>
        </div>

        <!-- 2.4 站外曝光数据 -->
        <div class="subsection" id="section-external">
          <h4>🌐 站外曝光数据</h4>
          <div id="externalData">
            <!-- JS动态渲染，无数据时整个subsection隐藏 -->
          </div>
        </div>

      </div>
    </section>

    <!-- 三、本周重点 -->
    <section class="section" id="section-highlights">
      <div class="section-header">
        <span class="section-icon">⭐</span>
        <h2>本周重点</h2>
      </div>
      <div class="section-body">
        <div class="editor-wrapper">
          <!-- 自定义工具栏 -->
          <div class="custom-toolbar" id="editorToolbar">
            <button data-cmd="bold" title="加粗"><b>B</b></button>
            <button data-cmd="italic" title="斜体"><i>I</i></button>
            <button data-cmd="underline" title="下划线"><u>U</u></button>
            <span class="separator"></span>
            <select id="fontSizeSelect" title="字号">
              <option value="">字号</option>
              <option value="1">小</option>
              <option value="3">正常</option>
              <option value="4">大</option>
              <option value="5">特大</option>
            </select>
            <select id="lineHeightSelect" title="行距">
              <option value="">行距</option>
              <option value="1.2">1.2</option>
              <option value="1.5">1.5</option>
              <option value="1.8">1.8</option>
              <option value="2.0">2.0</option>
              <option value="2.5">2.5</option>
            </select>
            <span class="separator"></span>
            <button data-cmd="indent" title="增加缩进">缩进→</button>
            <button data-cmd="outdent" title="减少缩进">←缩进</button>
            <span class="separator"></span>
            <button data-cmd="insertOrderedList" title="有序列表">1.</button>
            <button data-cmd="insertUnorderedList" title="无序列表">•</button>
            <span class="separator"></span>
            <button data-cmd="formatBlock-blockquote" title="引用">引用</button>
            <button data-cmd="formatBlock-h2" title="标题">标题</button>
            <button data-cmd="formatBlock-p" title="段落">段落</button>
            <span class="separator"></span>
            <button data-cmd="insertImage" class="btn-image" title="插入图片">🖼️</button>
            <button data-cmd="removeFormat" class="btn-clear-format" title="删除格式">✕</button>
          </div>
          <!-- 编辑区域 -->
          <div class="editor-content" id="weekHighlightsEditor" contenteditable="false"></div>
          <!-- 保存状态栏 -->
          <div class="editor-save-bar">
            <span class="save-hint">⚠️ 内容自动保存到浏览器本地</span>
            <button class="btn-save" id="highlightsSaveBtn">💾 保存</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 四、下周重点 -->
    <section class="section" id="section-nextweek">
      <div class="section-header">
        <span class="section-icon">📋</span>
        <h2>下周重点</h2>
      </div>
      <div class="section-body">
        <div class="table-wrapper">
          <table class="next-week-table">
            <thead>
              <tr>
                <th>#</th>
                <th>事项</th>
                <th>可量化交付物</th>
                <th>完成时间</th>
                <th class="admin-only">操作</th>
              </tr>
            </thead>
            <tbody id="nextWeekBody">
              <!-- JS动态渲染 -->
            </tbody>
          </table>
        </div>
        <button id="addRowBtn" class="admin-only">+ 新增行</button>
        <!-- 保存栏 -->
        <div class="nextweek-save-bar">
          <span class="save-hint">⚠️ 内容保存到浏览器本地</span>
          <button class="btn-save" id="nextweekSaveBtn">💾 保存</button>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== 登录弹窗 ===== -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal-box">
      <div class="modal-title">🔐 管理者登录</div>
      <input type="password" class="modal-input" id="loginPassword" placeholder="请输入管理密码">
      <div class="modal-error" id="loginError"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="loginCancel">取消</button>
        <button class="btn-primary" id="loginSubmit">登录</button>
      </div>
    </div>
  </div>

  <!-- ===== 侧边栏（快照列表） ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>📸 快照历史</h3>
      <button class="sidebar-close" id="closeSidebar">✕</button>
    </div>
    <div class="sidebar-body" id="snapshotList">
      <div class="empty-state">暂无快照</div>
    </div>
  </aside>

  <!-- ===== Toast提示 ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== JS依赖 ===== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- 应用JS -->
  <script>
    // 动态加载JS并禁用缓存
    var ts = Date.now();
    var scripts = ['js/data.js', 'js/charts.js', 'js/app.js'];
    scripts.forEach(function(src) {
      document.write('<script src="' + src + '?v=' + ts + '"><\/script>');
    });
  </script>
</body>
</html>
